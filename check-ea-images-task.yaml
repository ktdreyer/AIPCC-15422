apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: check-ea-images
spec:
  description: >-
    Checks a build-args conf file for EA image version references
    and fails the build if any are found.
  params:
    - name: BUILD_ARGS_FILE
      type: string
      description: >-
        Path to the build-args conf file to check, relative to
        the source workspace (e.g. "build-args/cuda-ubi9.conf").
  workspaces:
    - name: source
      description: Workspace containing the source code (cloned by clone-repository)
  steps:
    - name: check
      image: quay.io/aipcc-cicd/toolbox:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        assert-no-ea-build-args.sh "$(params.BUILD_ARGS_FILE)"
