apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: check-ea-images
spec:
  description: >-
    Runs the repo's has-ea-images script and fails the build
    if EA image references are found in the build configuration.

    Use this to fail early on GA branches that should *not* use EA images.
  workspaces:
    - name: source
      description: Workspace containing the source code (cloned by clone-repository)
  steps:
    - name: check
      image: registry.access.redhat.com/ubi9-minimal:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Repos opt in to this check by shipping an executable
        # has-ea-images script. Repos without the script pass
        # silently, so this task is safe to enable globally.
        if [ ! -x ./has-ea-images ]; then
          echo "No has-ea-images script found, skipping check"
          exit 0
        fi

        if ./has-ea-images; then
          echo "ERROR: EA image references found in build configuration"
          exit 1
        fi
