# Add this parameter to the pipeline's params list:
- default: "true"
  description: Whether this is a stable release. Stable builds must not reference EA or "fast" image versions.
  name: stable-release
  type: string

# Add this task entry to the pipeline:
- name: assert-all-images-are-stable
  params:
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
  runAfter:
    - clone-repository
  when:
    - input: $(params.stable-release)
      operator: in
      values:
        - "true"
  taskRef:
    name: assert-all-images-are-stable

# Add assert-all-images-are-stable to prefetch-dependencies runAfter:
- name: prefetch-dependencies
  # ...
  runAfter:
    - clone-repository
    - assert-all-images-are-stable
