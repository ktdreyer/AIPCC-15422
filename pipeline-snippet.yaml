# Add this parameter to the pipeline's params list:
- name: ea-build
  type: string
  default: "false"
  description: >-
    Whether this is an Early Access build.
    EA builds skip the "no EA images" assertion.

# Add this task entry alongside deprecated-base-image-check:
- name: assert-no-ea-images
  params:
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
  workspaces:
    - name: source
      workspace: workspace
  runAfter:
    # Run right after clone so we fail fast, before the
    # expensive multi-platform container build starts.
    - clone-repository
  when:
    # Only check on non-EA builds. EA builds are expected to
    # reference EA images.
    - input: $(params.ea-build)
      operator: in
      values:
        - "false"
    - input: $(params.skip-checks)
      operator: in
      values:
        - "false"
  taskRef:
    name: assert-no-ea-images
