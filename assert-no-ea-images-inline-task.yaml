apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: assert-all-images-are-stable
spec:
  description: >-
    Checks a build-args conf file for non-stable (EA or "fast") image version
    references and fails the build if any are found. Stable builds must
    never reference non-stable image versions.
  params:
    - name: BUILD_ARGS_FILE
      type: string
      description: >-
        Path to the build-args conf file to check, relative to
        the source workspace (e.g. "build-args/cuda-ubi9.conf").
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with the application source code.
      type: string
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/redhat-appstudio/build-trusted-artifacts:latest@sha256:8391272c4e5011120e9e7fee2c1f339e9405366110bf239dadcbc21e953ce099
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
    - name: check
      image: registry.access.redhat.com/ubi9-minimal:latest
      workingDir: /var/workdir/source
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        FILE="$(params.BUILD_ARGS_FILE)"

        if [ -z "$FILE" ]; then
            echo "No build-args-file specified, skipping stability check."
            exit 0
        fi

        if [ ! -f "$FILE" ]; then
            echo "Build-args file not found: $FILE, skipping stability check."
            exit 0
        fi

        fail=0
        matches=$(grep -inE '^[A-Za-z0-9_]+=.*(-ea\.|-fast\.)' "$FILE" || true)
        if [ -n "$matches" ]; then
            echo "ERROR: Non-stable version references found in $FILE:"
            echo "$matches"
            fail=1
        fi

        if [ "$fail" -eq 0 ]; then
            echo "All image references in $FILE are stable."
        fi
        exit $fail
  volumes:
    - name: workdir
      emptyDir: {}
